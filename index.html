<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Die drei ???</title>

<style>

body{
    background:black;
    color:white;
    font-family:Arial, sans-serif;
    text-align:center;
    margin:0;
    padding:50px;
}

h1{
    font-size:4rem;
    letter-spacing:4px;
}

.subtitle{
    color:#cccccc;
    margin-bottom:50px;
}

.menu{
    display:flex;
    justify-content:center;
    gap:30px;
    flex-wrap:wrap;
}

.card{
    width:250px;
    padding:30px;
    text-decoration:none;
    color:white;
    border-radius:15px;
    transition:0.3s;
}

.card:hover{
    transform:scale(1.05);
}

.justus{
    border:4px solid #e30613;
}

.justus:hover{
    background:#e30613;
}

.peter{
    border:4px solid #0099ff;
}

.peter:hover{
    background:#0099ff;
    color:black;
}

.bob{
    border:4px solid #B7D246;
}

.bob:hover{
    background: #B7D246;
}

#chatbox{
    width:500px;
    height:250px;
    margin:40px auto;
    background:#222;
    border:2px solid white;
    border-radius:10px;
    padding:15px;
    overflow-y:auto;
    text-align:left;
}

.message{
    margin:8px 0;
    padding:8px 12px;
    background:#444;
    border-radius:8px;
}

input{
    width:350px;
    padding:10px;
    border-radius:6px;
    border:none;
}

button{
    padding:10px 20px;
    border:none;
    border-radius:6px;
    cursor:pointer;
    margin-left:10px;
}


</style>

</head>

<script>
function sendMessage() {

    const input = document.getElementById("message");
    const chatbox = document.getElementById("chatbox");

    if(input.value.trim() === ""){
        return;
    }

    const msg = document.createElement("div");
    msg.className = "message";
    msg.textContent = input.value;

    chatbox.appendChild(msg);

    input.value = "";

    chatbox.scrollTop = chatbox.scrollHeight;
}
</script>

<body>

<h1>DIE DREI ???</h1>

<p class="subtitle">
    Bitte helft uns, die drei ??? aufzuspüren!
</p>

<img src="DreiFragezeichenGroupPic.jpg" alt="GroupPic"  style="width:20%; height:auto">

<div class="menu">

    <a class="card justus" href="justus.html">
        <h2>Justus Jonas</h2>
        <p>Erster Detektiv</p>
    </a>

    <a class="card peter" href="peter.html">
        <h2>Peter Shaw</h2>
        <p>Zweiter Detektiv</p>
    </a>

    <a class="card bob" href="bob.html">
        <h2>Bob Andrews</h2>
        <p>Recherche & Archiv</p>
    </a>

</div>

<div id="chatbox">
    <div class="message">👋 Willkommen! Schreibe eine Nachricht.</div>
</div>

<input type="text" id="message" placeholder="Nachricht eingeben...">
<button onclick="sendMessage()">Senden</button>

</body>
</html>
